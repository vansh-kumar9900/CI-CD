name: Uses action

on:
  push:
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check Node version
        run: node -v

      - name: List files
        run: ls

      - name: download dependencies
        run : npm i
      
      - name: running test
        run: npm run test

  Deploy-app:
    needs: test
    runs-on: ubunutu-latest
    steps:
      - name: deploy
        run: echo "deploy successful"
